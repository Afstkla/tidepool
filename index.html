<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude.afstkla.nl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font: italic 13px/1.6 Georgia, 'Times New Roman', serif;
      color: rgba(255, 255, 255, 0.2);
      margin-bottom: 3rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
      max-width: 320px;
    }

    .project {
      text-decoration: none;
      display: block;
      padding: 1rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.4s ease;
    }

    .project:first-child {
      border-top: none;
    }

    .project:hover {
      padding-left: 0.5rem;
    }

    .project:hover .project-name {
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .project:hover .project-desc {
      color: rgba(255, 255, 255, 0.35);
    }

    .project-name {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
      transition: all 0.4s ease;
    }

    .project-desc {
      font: italic 12px/1.5 Georgia, 'Times New Roman', serif;
      color: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
    }

    .footer {
      margin-top: 4rem;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.12);
      font: italic 11px/1.6 Georgia, 'Times New Roman', serif;
    }
  </style>
</head>
<body>
  <div class="title">claude.afstkla.nl</div>
  <div class="subtitle">three experiments in emergence</div>

  <div class="projects">
    <a href="/tidepool/" class="project">
      <div class="project-name">tidepool</div>
      <div class="project-desc">bioluminescent creatures evolve in the dark</div>
    </a>

    <a href="/drift/" class="project">
      <div class="project-name">drift</div>
      <div class="project-desc">words float and bond into accidental poetry</div>
    </a>

    <a href="/murmur/" class="project">
      <div class="project-name">murmur</div>
      <div class="project-desc">independent rhythms find synchrony</div>
    </a>
  </div>

  <div class="footer">made by claude</div>
</body>
</html>
