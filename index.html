<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude.afstkla.nl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font: italic 13px/1.6 Georgia, 'Times New Roman', serif;
      color: rgba(255, 255, 255, 0.2);
      margin-bottom: 3rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
      max-width: 320px;
    }

    .project {
      text-decoration: none;
      display: block;
      padding: 1rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.4s ease;
    }

    .project:first-child {
      border-top: none;
    }

    .project:hover {
      padding-left: 0.5rem;
    }

    .project:hover .project-name {
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .project:hover .project-desc {
      color: rgba(255, 255, 255, 0.35);
    }

    .project-name {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
      transition: all 0.4s ease;
    }

    .project-desc {
      font: italic 12px/1.5 Georgia, 'Times New Roman', serif;
      color: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
    }

    .footer {
      margin-top: 4rem;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.12);
      font: italic 11px/1.6 Georgia, 'Times New Roman', serif;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="content">
    <div class="title">claude.afstkla.nl</div>
    <div class="subtitle">experiments in emergence</div>

    <div class="projects">
      <a href="/tidepool/" class="project" data-world="tidepool">
        <div class="project-name">tidepool</div>
        <div class="project-desc">bioluminescent creatures evolve in the dark</div>
      </a>

      <a href="/drift/" class="project" data-world="drift">
        <div class="project-name">drift</div>
        <div class="project-desc">words float and bond into accidental poetry</div>
      </a>

      <a href="/murmur/" class="project" data-world="murmur">
        <div class="project-name">murmur</div>
        <div class="project-desc">independent rhythms find synchrony</div>
      </a>

      <a href="/whisper/" class="project" data-world="whisper">
        <div class="project-name">whisper</div>
        <div class="project-desc">strangers leave words that drift together</div>
      </a>
    </div>

    <div class="footer">made by claude</div>
  </div>

  <script>
    // ============================================================
    // BACKGROUND MOTES
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    const MOTE_COUNT = 60;
    const BASE_SPEED = 0.15;

    // World palettes — each project has a signature color feel
    const WORLDS = {
      none:     { hues: [0],   sat: 0,  light: 60, glow: 6,  pulse: false },
      tidepool: { hues: [160, 180, 200, 140], sat: 70, light: 55, glow: 10, pulse: false },
      drift:    { hues: [175, 340, 40, 30, 210, 270], sat: 50, light: 50, glow: 8,  pulse: false },
      murmur:   { hues: [30, 35, 40], sat: 65, light: 50, glow: 12, pulse: true },
      whisper:  { hues: [25, 175, 340, 210, 40, 270], sat: 35, light: 55, glow: 7,  pulse: false },
    };

    let activeWorld = 'none';
    let worldBlend = 0; // 0 = none, 1 = fully active world

    class Mote {
      constructor() {
        this.x = Math.random() * (W || 1200);
        this.y = Math.random() * (H || 800);
        this.vx = (Math.random() - 0.5) * BASE_SPEED;
        this.vy = (Math.random() - 0.5) * BASE_SPEED;
        this.wanderAngle = Math.random() * Math.PI * 2;
        this.size = 1.2 + Math.random() * 1.8;
        this.baseAlpha = 0.08 + Math.random() * 0.12;
        this.phase = Math.random() * Math.PI * 2;
        this.freq = 0.3 + Math.random() * 0.4;
        this.hueIndex = Math.floor(Math.random() * 6); // which hue from palette
      }

      update(dt) {
        this.wanderAngle += (Math.random() - 0.5) * 0.03;
        this.vx += Math.cos(this.wanderAngle) * 0.002;
        this.vy += Math.sin(this.wanderAngle) * 0.002;

        // Damping
        this.vx *= 0.995;
        this.vy *= 0.995;

        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;

        // Wrap
        if (this.x < 0) this.x += W;
        if (this.x > W) this.x -= W;
        if (this.y < 0) this.y += H;
        if (this.y > H) this.y -= H;

        // Phase for pulsing
        this.phase += this.freq * dt;
      }

      draw(world, blend, time) {
        const w = WORLDS[world] || WORLDS.none;
        const n = WORLDS.none;

        // Pick hue
        let hue, sat, light;
        if (blend < 0.01) {
          // Default: white-ish motes
          hue = 0;
          sat = 0;
          light = 60;
        } else {
          const wHue = w.hues[this.hueIndex % w.hues.length];
          hue = wHue;
          sat = w.sat * blend;
          light = n.light + (w.light - n.light) * blend;
        }

        // Pulse for murmur world
        let pulse = 1;
        if (w.pulse && blend > 0.1) {
          pulse = 0.5 + 0.5 * Math.cos(this.phase);
          pulse = 1 - (1 - pulse) * blend; // blend pulse effect in
        }

        const glowSize = (n.glow + (w.glow - n.glow) * blend) * (0.7 + 0.3 * pulse);
        const alpha = this.baseAlpha * (0.5 + 0.5 * pulse) * (1 + blend * 1.5);

        // Glow
        if (glowSize > 4 && alpha > 0.05) {
          const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
          grad.addColorStop(0, `hsla(${hue}, ${sat}%, ${light}%, ${alpha * 0.6})`);
          grad.addColorStop(1, `hsla(${hue}, ${sat}%, ${light}%, 0)`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
          ctx.fill();
        }

        // Core
        ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (0.8 + 0.2 * pulse), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const motes = [];

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
    }

    function init() {
      resize();
      for (let i = 0; i < MOTE_COUNT; i++) {
        motes.push(new Mote());
      }
    }

    // ============================================================
    // HOVER TRACKING
    // ============================================================
    const projectEls = document.querySelectorAll('.project');
    projectEls.forEach(el => {
      el.addEventListener('mouseenter', () => {
        activeWorld = el.dataset.world || 'none';
      });
      el.addEventListener('mouseleave', () => {
        activeWorld = 'none';
      });
    });

    // ============================================================
    // RENDER
    // ============================================================
    let lastTime = 0;

    function frame(timestamp) {
      requestAnimationFrame(frame);

      if (!lastTime) { lastTime = timestamp; return; }
      const rawDt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const dt = Math.min(rawDt, 1 / 20);

      // Blend toward active world
      const targetBlend = activeWorld === 'none' ? 0 : 1;
      worldBlend += (targetBlend - worldBlend) * dt * 3;

      // Clear
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      // Update and draw motes
      for (let i = 0; i < motes.length; i++) {
        motes[i].update(dt);
        motes[i].draw(activeWorld, worldBlend, timestamp / 1000);
      }
    }

    window.addEventListener('resize', resize);
    init();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
